name: CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    environment: .env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file from secret
        shell: bash
        run: |
          if [ -n "${{ secrets.OCI_ENV_FILE }}" ]; then
            printf "%s" "${{ secrets.OCI_ENV_FILE }}" > .env
          else
            echo "Error: OCI_ENV_FILE secret not set" && exit 1
          fi

      - name: Validate and source .env
        shell: bash
        run: |
          source .env
          test -n "$OCI_HOST" || (echo "Missing in .env: OCI_HOST" && exit 1)
          test -n "$OCI_USER" || (echo "Missing in .env: OCI_USER" && exit 1)
          test -n "$OCI_SSH_PRIVATE_KEY" || (echo "Missing in .env: OCI_SSH_PRIVATE_KEY" && exit 1)
          echo "All required variables found in .env"

      - name: Setup SSH key
        shell: bash
        run: |
          source .env
          mkdir -p ~/.ssh
          printf "%s" "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          OCI_PORT=${OCI_PORT:-22}
          ssh-keyscan -p "$OCI_PORT" "$OCI_HOST" >> ~/.ssh/known_hosts

      - name: Sync repository to Oracle VM
        shell: bash
        run: |
          source .env
          OCI_PORT=${OCI_PORT:-22}
          OCI_APP_PATH=${OCI_APP_PATH:-/home/$OCI_USER/kafka-mini-project}
          rsync -az --delete \
            -e "ssh -i ~/.ssh/oci_key -p $OCI_PORT" \
            --exclude ".git" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            ./ "$OCI_USER@$OCI_HOST:$OCI_APP_PATH/"

      - name: Deploy with docker compose
        shell: bash
        run: |
          source .env
          OCI_PORT=${OCI_PORT:-22}
          OCI_APP_PATH=${OCI_APP_PATH:-/home/$OCI_USER/kafka-mini-project}
          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" "$OCI_USER@$OCI_HOST" << 'EOF'
            set -e
            cd "$OCI_APP_PATH"
            docker compose down
            docker compose up -d --build
          EOF