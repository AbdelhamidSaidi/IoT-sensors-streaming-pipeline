name: CD

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    environment: .env

    permissions:
      id-token: write   # Required for OIDC auth to AWS
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.AWS_ROLE_ARN }}"        ]] && missing+=("AWS_ROLE_ARN")
          [[ -z "${{ secrets.AWS_REGION }}"          ]] && missing+=("AWS_REGION")
          [[ -z "${{ secrets.EC2_INSTANCE_ID }}"     ]] && missing+=("EC2_INSTANCE_ID")
          [[ -z "${{ secrets.EC2_APP_PATH }}"        ]] && missing+=("EC2_APP_PATH")
          [[ -z "${{ secrets.MSSQL_SA_PASSWORD }}"   ]] && missing+=("MSSQL_SA_PASSWORD")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ Missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create .env file
        run: |
          cat > .env <<EOF
          MSSQL_SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          EOF
          echo "✅ .env file created"

      - name: Zip repository
        run: |
          zip -r app.zip . \
            --exclude "*.git*" \
            --exclude "*__pycache__*" \
            --exclude "*.pytest_cache*" \
            --exclude "*.pyc"
          echo "✅ Repository zipped"

      - name: Upload zip to EC2 via SSM S3 transfer
        run: |
          # Upload zip to a temp S3 bucket location
          aws s3 cp app.zip "s3://${{ secrets.AWS_S3_DEPLOY_BUCKET }}/deploy/app.zip"
          echo "✅ Zip uploaded to S3"

      - name: Ensure app directory exists on EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"mkdir -p ${{ secrets.EC2_APP_PATH }}\"]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
          echo "✅ App directory ready"

      - name: Sync repository to EC2 via S3
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"aws s3 cp s3://${{ secrets.AWS_S3_DEPLOY_BUCKET }}/deploy/app.zip /tmp/app.zip\",
              \"unzip -o /tmp/app.zip -d ${{ secrets.EC2_APP_PATH }}\",
              \"rm /tmp/app.zip\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
          echo "✅ Repository synced"

      - name: Install Docker if not present
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"if ! command -v docker &> /dev/null; then\",
              \"  echo 'Installing Docker...'\",
              \"  apt-get update -y\",
              \"  apt-get install -y ca-certificates curl gnupg\",
              \"  install -m 0755 -d /etc/apt/keyrings\",
              \"  curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg\",
              \"  chmod a+r /etc/apt/keyrings/docker.gpg\",
              \"  echo \\\"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable\\\" | tee /etc/apt/sources.list.d/docker.list\",
              \"  apt-get update -y\",
              \"  apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin\",
              \"  systemctl start docker\",
              \"  systemctl enable docker\",
              \"  echo '✅ Docker installed'\",
              \"else\",
              \"  echo '✅ Docker already installed, skipping'\",
              \"fi\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

      - name: Deploy with Docker Compose
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"cd ${{ secrets.EC2_APP_PATH }}\",
              \"docker compose down\",
              \"docker compose up -d --build\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
          echo "✅ Deployment complete"

      - name: Clean up S3 deploy artifact
        if: always()
        run: |
          aws s3 rm "s3://${{ secrets.AWS_S3_DEPLOY_BUCKET }}/deploy/app.zip" || true